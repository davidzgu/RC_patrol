# RTMP server configuration for GoPro Hero 11 Black streaming
# RC Patrol Project

worker_processes auto;
error_log "/Users/davidgu/Documents/GenAI Projects/RC_Patrol/logs/error.log";

events {
    worker_connections 1024;
}

# RTMP configuration
rtmp {
    server {
        listen 1935; # Default RTMP port
        chunk_size 4096;
        
        application live {
            live on;
            record off;
            
            # Allow publishing from GoPro (local network)
            allow publish all;
            
            # HLS settings for web playback (maximum low latency)
            hls on;
            hls_path "/Users/davidgu/Documents/GenAI Projects/RC_Patrol/hls";
            hls_fragment 500ms;       # 500ms chunks (minimum practical)
            hls_playlist_length 2;    # Keep only 2 seconds
            
            # Optional: Record stream to file
            # record all;
            # record_path "/Users/davidgu/Documents/GenAI Projects/RC_Patrol/recordings";
            # record_suffix -%Y%m%d-%H%M%S.flv;
        }
    }
}

# HTTP server for HLS playback
http {
    server {
        listen 8080;
        
        location / {
            root "/Users/davidgu/Documents/GenAI Projects/RC_Patrol/web";
            index index.html;
        }
        
        # Serve HLS stream
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root "/Users/davidgu/Documents/GenAI Projects/RC_Patrol";
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
        
        # RTMP statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        
        location /stat.xsl {
            root /opt/homebrew/share/nginx/html;
        }
    }
}
